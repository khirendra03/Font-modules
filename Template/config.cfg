# AXES:
#
# wght: WEIGHT
#       How thin or thick (light or heavy)
#       the strokes of the letterforms
#       can be.
#
# wdth: WIDTH
#       How narrow or wide (condensed or
#       extended) the letterforms can be.
#
# opsz: OPTICAL SIZE
#       Adjust the letterforms to make them
#       more legible at different sizes.
#       At smaller sizes, letters typically
#       become optimized for more legibility
#       with loose spacing.
#
# SPAC: SPACING
#       How loose or tight the horizontal
#       distance between each character.
#
# GRAD: GRADE
#       Similar to weight, but without
#       touching horizontal spacing.
#
# YAXS: Stretches the glyph vertically.

