# OPTICAL SIZE @ 17..28
OPSZ = 20


# OPENTYPE LAYOUT
# comma-separated list of OpenType feature tags
# e.g. OTL = ss01,ss02,tnum
# ╭─────────────────────────────╮
# │ cv03 │ Serifed capital j    │
# │ cv05 │ Serifed capital i    │
# │ cv06 │ Tailed lowercase L   │
# │ cv08 │ Slashed zero         │
# │ cv12 │ Serifed one          │
# │ ss01 │ Straight-sided 6 & 9 │
# │ ss02 │ Open four            │
# │ ss06 │ High legibility      │
# │ ss07 │ One storey a         │
# │ tnum │ Tabular figures      │
# ╰━━━━━━───────────────────────╯
OTL = 


# FONT STYLES             Weights
#                   ╭─────────────────╮
#                   │ T  │ Thin       │
#                   │ EL │ ExtraLight │
#      Fonts        │ L  │ Light      │
# ╭───────────────╮ │ R  │ Regular    │
# │ U │ Upright   │ │ M  │ Medium     │
# │ I │ Italic    │ │ SB │ SemiBold   │
# │ C │ Condensed │ │ B  │ Bold       │
# │ S │ Serif     │ │ EB │ ExtraBold  │
# │ M │ Monospace │ │ BL │ Black      │
# ╰━━━────────────╯ ╰━━━━─────────────╯
#    │       ╭─────────╯
#  ────── ───────
#  <font><weight>
#  ──────────────
#     ╭──╯
#  ───────
#  <style> = [<predefined instance>]
#  <style> = [<axis> <value> ...]

